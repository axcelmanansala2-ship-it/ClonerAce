name: ClonerAce Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.9
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.9-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/
          echo "/opt/gradle-8.9/bin" >> $GITHUB_PATH

      - name: Clone VirtualApp2022 Engine
        run: |
          git clone -b va --depth=1 https://github.com/bbajie/VirtualApp2022.git virtualapp
          sed -i 's/ package="com.lody.virtual"//' virtualapp/lib/src/main/AndroidManifest.xml
          cp scripts/virtualapp-lib-build.gradle virtualapp/lib/build.gradle

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: clonerface-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
